services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: convsummarizer
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      databaseUrl: postgresql+psycopg://postgres:postgres@db:5432/convsummarizer
      openaiApiKey: ${OPENAI_API_KEY:-}
      openaiModel: ${OPENAI_MODEL:-gpt-4o-mini}
      appEnv: development
    ports:
      - "8000:8000"

volumes:
  pgdata:
